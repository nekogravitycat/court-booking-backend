PickupGroupResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    host_id:
      type: string
      format: uuid
    title:
      type: string
    host_name:
      type: string
    host_phone:
      type: string
      nullable: true
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    fee:
      type: number
    capacity:
      type: integer
    location_id:
      type: string
      format: uuid
    skill_level:
      type: string
      enum: [A, B, C, D]
    status:
      type: string
      enum: [active, cancelled, completed]
    enable:
      type: boolean
      description: "啟用狀態"
    current_enrolled:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - host_id
    - title
    - host_name
    - start_time
    - end_time
    - fee
    - capacity
    - location_id
    - skill_level
    - status
    - enable
    - current_enrolled
    - created_at
    - updated_at

PickupGroupDetailResponse:
  allOf:
    - $ref: "#/PickupGroupResponse"
    - type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/PickupOrderResponse"

# 精簡的公開列表項目，用於 GET /pickup-groups 與 GET /hosts/{host_id}/pickup-groups。
# 不含主辦人電話等敏感資訊。
PickupGroupBrief:
  type: object
  properties:
    id:
      type: string
      format: uuid
    host_nickname:
      type: string
      description: "主辦人暱稱 (host_name 快照)"
    location_id:
      type: string
      format: uuid
    title:
      type: string
    skill_level:
      type: string
      enum: [A, B, C, D]
  required:
    - id
    - host_nickname
    - location_id
    - title
    - skill_level

CreatePickupGroupRequest:
  type: object
  properties:
    title:
      type: string
    host_name:
      type: string
      description: "負責人姓名 (手動填寫，若不填則由系統帶入)"
    host_phone:
      type: string
      description: "負責人電話 (手動填寫，若不填則由系統帶入)"
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    fee:
      type: number
    capacity:
      type: integer
    location_id:
      type: string
      format: uuid
      description: "場地 ID (關聯至 Location)"
    skill_level:
      type: string
      enum: [A, B, C, D]
    enable:
      type: boolean
      default: true
      description: "啟用狀態"
  required:
    - title
    - start_time
    - end_time
    - fee
    - capacity
    - location_id
    - skill_level

UpdatePickupGroupRequest:
  type: object
  properties:
    title:
      type: string
    host_name:
      type: string
    host_phone:
      type: string
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    fee:
      type: number
    capacity:
      type: integer
    location_id:
      type: string
      format: uuid
    skill_level:
      type: string
      enum: [A, B, C, D]
    status:
      type: string
      enum: [active, cancelled, completed]
    enable:
      type: boolean

PickupOrderResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    pickup_group_id:
      type: string
      format: uuid
    user_id:
      type: string
      format: uuid
    booker_name:
      type: string
    booker_phone:
      type: string
      nullable: true
    status:
      type: string
      enum: [pending, confirmed, cancelled, cancel_request]
      description: "報名生命週期狀態"
    payment_status:
      type: string
      enum: [done, pending, failed]
      description: "付款狀態"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - pickup_group_id
    - user_id
    - booker_name
    - status
    - payment_status
    - created_at
    - updated_at

CreatePickupOrderRequest:
  type: object
  description: "目前無必要欄位，因報名通常只依據路徑參數群組 ID 和 Token 中的使用者 ID 決定。"
  properties: {}

UpdatePickupOrderRequest:
  type: object
  description: |
    status 與 payment_status 至少需提供一個。
    - status：報名者本人僅能將自己的訂單改為 cancelled 或 cancel_request；
      group host 或系統管理員可設定任意值（審核用途）。
    - payment_status：僅 group host 或系統管理員可變更。
  properties:
    status:
      type: string
      enum: [pending, confirmed, cancelled, cancel_request]
    payment_status:
      type: string
      enum: [done, pending, failed]

# GET /pickup-groups 與 GET /hosts/{host_id}/pickup-groups 的分頁回應 (精簡欄位)。
PickupGroupBriefPageResponse:
  allOf:
    - $ref: "./common.yml#/PageResponse"
    - type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/PickupGroupBrief"

PickupGroupPageResponse:
  allOf:
    - $ref: "./common.yml#/PageResponse"
    - type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/PickupGroupResponse"
