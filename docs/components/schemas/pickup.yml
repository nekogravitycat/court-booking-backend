PickupHostTag:
  type: object
  description: "主辦人資訊，即時取自 users (非快照)。"
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    display_name:
      type: string
      nullable: true
    phone:
      type: string
      nullable: true
  required:
    - id
    - username

PickupGroupResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    host:
      $ref: "#/PickupHostTag"
    title:
      type: string
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    fee:
      type: number
    capacity:
      type: integer
    location_id:
      type: string
      format: uuid
    sport:
      $ref: "./sport.yml#/SportTag"
    skill_level:
      $ref: "./skilllevel.yml#/SkillLevelTag"
    status:
      type: string
      enum: [active, cancelled, completed]
    enable:
      type: boolean
      description: "啟用狀態"
    current_enrolled:
      type: integer
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - host
    - title
    - start_time
    - end_time
    - fee
    - capacity
    - location_id
    - sport
    - skill_level
    - status
    - enable
    - current_enrolled
    - created_at
    - updated_at

PickupGroupDetailResponse:
  allOf:
    - $ref: "#/PickupGroupResponse"
    - type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/PickupOrderResponse"

# 精簡的公開列表項目，用於 GET /pickup-groups 與 GET /hosts/{host_id}/pickup-groups。
# 不含主辦人電話等敏感資訊。
PickupGroupBrief:
  type: object
  properties:
    id:
      type: string
      format: uuid
    host_id:
      type: string
      format: uuid
    host_username:
      type: string
    host_display_name:
      type: string
      nullable: true
    location_id:
      type: string
      format: uuid
    title:
      type: string
    sport:
      $ref: "./sport.yml#/SportTag"
    skill_level:
      $ref: "./skilllevel.yml#/SkillLevelTag"
    start_time:
      type: string
      format: date-time
    fee:
      type: number
    enrolled_status:
      type: string
      enum: [free, pending, confirmed, cancelled, cancel_request, rejected]
      description: |
        呼叫者對此臨打團的狀態。未登入或未報名時為 free；
        已報名時反映該使用者訂單的實際狀態。rejected 表示已被主辦人拒絕，無法再次報名。
  required:
    - id
    - host_id
    - host_username
    - location_id
    - title
    - sport
    - skill_level
    - start_time
    - fee
    - enrolled_status

CreatePickupGroupRequest:
  type: object
  properties:
    title:
      type: string
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    fee:
      type: number
    capacity:
      type: integer
    location_id:
      type: string
      format: uuid
      description: "場地 ID (關聯至 Location)"
    sport_id:
      type: string
      format: uuid
      description: "球類 ID (關聯至 Sport)"
    skill_level_id:
      type: string
      format: uuid
      description: "程度分級 ID (關聯至 SkillLevel，必須隸屬於所選 sport_id)"
    enable:
      type: boolean
      default: true
      description: "啟用狀態"
  required:
    - title
    - start_time
    - end_time
    - fee
    - capacity
    - location_id
    - sport_id
    - skill_level_id

UpdatePickupGroupRequest:
  type: object
  properties:
    title:
      type: string
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    fee:
      type: number
    capacity:
      type: integer
    location_id:
      type: string
      format: uuid
    sport_id:
      type: string
      format: uuid
    skill_level_id:
      type: string
      format: uuid
      description: "若變更 sport_id 或 skill_level_id，分級仍須隸屬於該球類。"
    status:
      type: string
      enum: [active, cancelled, completed]
    enable:
      type: boolean

PickupOrderResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    pickup_group_id:
      type: string
      format: uuid
    user_id:
      type: string
      format: uuid
    booker_name:
      type: string
    booker_phone:
      type: string
      nullable: true
    status:
      type: string
      enum: [pending, confirmed, cancelled, cancel_request, rejected]
      description: "報名生命週期狀態。rejected 由主辦人設定 (拒絕報名)，不計入 current_enrolled，且該使用者無法再次報名。"
    payment_status:
      type: string
      enum: [done, pending, failed]
      description: "付款狀態"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - pickup_group_id
    - user_id
    - booker_name
    - status
    - payment_status
    - created_at
    - updated_at

CreatePickupOrderRequest:
  type: object
  description: "目前無必要欄位，因報名通常只依據路徑參數群組 ID 和 Token 中的使用者 ID 決定。"
  properties: {}

UpdatePickupOrderRequest:
  type: object
  description: |
    status 與 payment_status 至少需提供一個。
    - status：報名者本人僅能將自己的訂單改為 cancelled 或 cancel_request；
      group host 或系統管理員可設定任意值（審核用途），包含 rejected（拒絕報名）。
    - rejected：僅 group host 或系統管理員可設定；被拒絕的使用者無法再次報名同一團，
      且該訂單不計入 current_enrolled。
    - payment_status：僅 group host 或系統管理員可變更。
  properties:
    status:
      type: string
      enum: [pending, confirmed, cancelled, cancel_request, rejected]
    payment_status:
      type: string
      enum: [done, pending, failed]

# GET /pickup-groups 與 GET /hosts/{host_id}/pickup-groups 的分頁回應 (精簡欄位)。
PickupGroupBriefPageResponse:
  allOf:
    - $ref: "./common.yml#/PageResponse"
    - type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/PickupGroupBrief"

PickupGroupPageResponse:
  allOf:
    - $ref: "./common.yml#/PageResponse"
    - type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/PickupGroupResponse"
