UserResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    email:
      type: string
      format: email
    username:
      type: string
      description: "唯一帳號代稱 (小寫英文、數字、底線，4-15 字)。目前不可修改。"
    display_name:
      type: string
      nullable: true
    avatar:
      type: string
      format: uri
      nullable: true
    avatar_thumbnail:
      type: string
      format: uri
      nullable: true
    created_at:
      type: string
      format: date-time
    last_login_at:
      type: string
      format: date-time
      nullable: true
    phone:
      type: string
      nullable: true
    is_active:
      type: boolean
    is_system_admin:
      type: boolean
    is_pickup_host:
      type: boolean
      description: "是否具有球團主辦人 (pickup host) 身分"
    organizations:
      type: array
      description: The list of organizations the user belongs to
      items:
        $ref: "./organization.yml#/OrganizationBrief"
  required:
    - id
    - email
    - username
    - created_at
    - is_active
    - is_system_admin
    - is_pickup_host
    - organizations

MeResponse:
  type: object
  description: 包裝 User 物件的回應格式
  properties:
    user:
      $ref: "#/UserResponse"
  required:
    - user

RegisterRequest:
  type: object
  properties:
    email:
      type: string
      format: email
    username:
      type: string
      pattern: "^[a-z0-9_]{4,15}$"
      description: "唯一帳號代稱 (小寫英文、數字、底線，4-15 字)。大寫會自動轉為小寫。"
    password:
      type: string
      minLength: 8
    display_name:
      type: string
  required:
    - email
    - username
    - password
    - display_name

LoginRequest:
  type: object
  properties:
    email:
      type: string
      format: email
    password:
      type: string
  required:
    - email
    - password

LoginResponse:
  type: object
  properties:
    access_token:
      type: string
    user:
      $ref: "#/UserResponse"
  required:
    - access_token
    - user

UpdateUserRequest:
  type: object
  properties:
    display_name:
      type: string
    is_active:
      type: boolean
    is_system_admin:
      type: boolean

UserTag:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
  required:
    - id
    - name

AddPickupHostRequest:
  type: object
  description: "授予使用者球團主辦人 (pickup host) 身分"
  properties:
    user_id:
      type: string
      format: uuid
  required:
    - user_id
