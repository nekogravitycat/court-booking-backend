BookingResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    resource:
      $ref: "./resource.yml#/ResourceTag"
    user:
      $ref: "./user.yml#/UserTag"
    location:
      $ref: "./location.yml#/LocationTag"
    organization:
      $ref: "./organization.yml#/OrganizationTag"
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    status:
      type: string
      enum: [pending, confirmed, cancelled, cancel_request]
    payment_status:
      type: string
      enum: [done, pending, failed]
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  required:
    - id
    - resource
    - user
    - location
    - organization
    - start_time
    - end_time
    - status
    - payment_status

CreateBookingRequest:
  type: object
  properties:
    resource_id:
      type: string
      format: uuid
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
  required:
    - resource_id
    - start_time
    - end_time

UpdateBookingRequest:
  type: object
  properties:
    start_time:
      type: string
      format: date-time
    end_time:
      type: string
      format: date-time
    status:
      type: string
      enum: [pending, confirmed, cancelled, cancel_request]
      description: "報名者本人僅能設為 cancelled 或 cancel_request"
    payment_status:
      type: string
      enum: [done, pending, failed]
      description: "僅管理員 (系統管理員 / 組織管理員) 可變更"
