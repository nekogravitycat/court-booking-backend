pickupGroups:
  get:
    tags:
      - Pickup Groups
    summary: "取得可預約的臨打團列表 (公開)"
    description: |
      取得目前可進行預約的臨打團清單（status=active、enable=true、尚未結束且未額滿）。
      回傳精簡欄位：主辦人暱稱、位置、球團名稱與程度。

      **權限 Access Control**:
      - **Public**: 無需登入即可存取。
    security: []
    parameters:
      - name: skill_level
        in: query
        required: false
        schema:
          type: string
          enum: [A, B, C, D]
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/pickup.yml#/PickupGroupBriefPageResponse"
  post:
    tags:
      - Pickup Groups
    summary: "建立新的臨打團 (僅限球團主辦人)"
    description: |
      建立新的臨打團。host_id 直接由 JWT Token 解析得出。

      **權限 Access Control**:
      - **Pickup Host Required**: 僅具有 pickup host 身分 (或系統管理員) 的使用者可建立。
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/pickup.yml#/CreatePickupGroupRequest"
    responses:
      "201":
        description: Created
        content:
          application/json:
            schema:
              $ref: "../components/schemas/pickup.yml#/PickupGroupResponse"

pickupGroupDetail:
  get:
    tags:
      - Pickup Groups
    summary: "取得單一臨打團詳細資訊"
    description: |
      包含 current_enrolled，並選擇性夾帶該團的所有訂單明細。
      
      **權限 Access Control**:
      - **Login Required**: 任何已登入的使用者皆可存取。
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/pickup.yml#/PickupGroupDetailResponse"
  patch:
    tags:
      - Pickup Groups
    summary: "更新臨打團資訊 (主辦人本人或系統管理員)"
    description: |
      更新臨打團資訊（含變更臨打團狀態）。

      **權限 Access Control**:
      - **Pickup Host (own group)**: 球團主辦人可更新自己主辦的臨打團。
      - **System Admin**: 系統管理員可更新任意臨打團。
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/pickup.yml#/UpdatePickupGroupRequest"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/pickup.yml#/PickupGroupResponse"
  delete:
    tags:
      - Pickup Groups
    summary: "刪除臨打團 (僅限系統管理員)"
    description: |
      刪除臨打團。注意：若該臨打團尚有訂單存在，刪除操作將會因資料庫限制而失敗。
      
      **權限 Access Control**:
      - **System Admin Required**: 僅系統管理員身分的使用者可存取。
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: No Content
      "404":
        description: Not Found
        content:
          application/json:
            schema:
              $ref: "../components/schemas/common.yml#/ErrorResponse"

pickupGroupOrders:
  get:
    tags:
      - Pickup Orders
    summary: "取得該臨打團的所有訂單"
    description: |
      列出該 pickup-group 的所有訂單（審核報名成員用途）。

      **權限 Access Control**:
      - **Login Required**: 僅該 pickup-group 主辦人或系統管理員能查看。
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas/pickup.yml#/PickupOrderResponse"
  post:
    tags:
      - Pickup Orders
    summary: "新增報名訂單（加入臨打團）"
    description: |
      加入臨打團。user_id 由 JWT Token 解析得出。
      會檢查目前有效報名人數是否超過 capacity。
      確保同一使用者不可重複報名同一臨打團。
      
      **權限 Access Control**:
      - **Login Required**: 任何已登入的使用者皆可存取。
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "201":
        description: Created
        content:
          application/json:
            schema:
              $ref: "../components/schemas/pickup.yml#/PickupOrderResponse"
      "409":
        description: group is fully booked or user already enrolled
        content:
          application/json:
            schema:
              $ref: "../components/schemas/common.yml#/ErrorResponse"

pickupOrderDetail:
  patch:
    tags:
      - Pickup Orders
    summary: "更新訂單狀態"
    description: |
      拆分為 status (報名生命週期) 與 payment_status (付款狀態)。
      當 status 為 cancelled 或 cancel_request 時，該訂單不再計入 current_enrolled，達成自動釋放名額之效果。

      **權限 Access Control**:
      - **Booker (本人)**: 只能將自己的訂單 status 改為 cancelled 或 cancel_request，且不可變更 payment_status。
      - **Group Host / System Admin**: 可設定任意 status 與 payment_status（審核用途）。
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/pickup.yml#/UpdatePickupOrderRequest"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/pickup.yml#/PickupOrderResponse"

hostPickupGroups:
  get:
    tags:
      - Pickup Groups
    summary: "取得特定主辦人舉辦的臨打團 (公開)"
    description: |
      取得指定主辦人所舉辦的臨打團清單。回傳精簡欄位 (同 GET /pickup-groups)，
      不含主辦人電話。

      **權限 Access Control**:
      - **Public**: 無需登入即可存取。
    security: []
    parameters:
      - name: host_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [active, cancelled, completed]
      - name: skill_level
        in: query
        required: false
        schema:
          type: string
          enum: [A, B, C, D]
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/pickup.yml#/PickupGroupBriefPageResponse"

pickupOrders:
  get:
    tags:
      - Pickup Orders
    summary: "取得該使用者自己送出的所有訂單"
    description: |
      列出該使用者自己送出的所有訂單。
      
      **權限 Access Control**:
      - **Login Required**: 任何已登入的使用者皆可存取。
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas/pickup.yml#/PickupOrderResponse"
