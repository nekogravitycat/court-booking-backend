sports:
  get:
    tags:
      - Sports
    summary: "取得球類列表 (公開)"
    description: |
      分頁查詢球類清單。

      **權限 Access Control**:
      - **Public**: 無需登入即可存取。
    security: []
    parameters:
      - $ref: "../components/parameters.yml#/page"
      - $ref: "../components/parameters.yml#/page_size"
      - name: active_only
        in: query
        required: false
        schema:
          type: boolean
        description: "僅回傳啟用中的球類"
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          enum: [code, name, created_at]
      - $ref: "../components/parameters.yml#/sort_order"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/sport.yml#/SportPageResponse"
  post:
    tags:
      - Sports
    summary: "新增球類 (僅限系統管理員)"
    description: |
      新增球類。code 會自動轉為大寫。

      **權限 Access Control**:
      - **System Admin Only**: 僅系統管理員可使用。
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/sport.yml#/CreateSportRequest"
    responses:
      "201":
        description: Created
        content:
          application/json:
            schema:
              $ref: "../components/schemas/sport.yml#/SportResponse"
      "409":
        description: sport code already used
        content:
          application/json:
            schema:
              $ref: "../components/schemas/common.yml#/ErrorResponse"

sportDetail:
  get:
    tags:
      - Sports
    summary: "取得單一球類 (公開)"
    security: []
    parameters: &idParams
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/sport.yml#/SportResponse"
      "404":
        description: Not found
  patch:
    tags:
      - Sports
    summary: "更新球類 (僅限系統管理員)"
    security:
      - bearerAuth: []
    parameters: *idParams
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/sport.yml#/UpdateSportRequest"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: "../components/schemas/sport.yml#/SportResponse"
      "404":
        description: Not found
  delete:
    tags:
      - Sports
    summary: "刪除球類 (僅限系統管理員，軟刪除)"
    security:
      - bearerAuth: []
    parameters: *idParams
    responses:
      "204":
        description: No Content
      "404":
        description: Not found
