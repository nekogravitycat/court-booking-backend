pickupHosts:
  get:
    tags:
      - Pickup Hosts
    summary: "列出所有球團主辦人 (僅限系統管理員)"
    description: |
      列出所有具有 pickup host 身分的使用者。

      **權限 Access Control**:
      - **System Admin Required**: 僅系統管理員可存取。
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yml#/PageResponse"
                - type: object
                  properties:
                    items:
                      type: array
                      items:
                        $ref: "../components/schemas/user.yml#/UserResponse"
  post:
    tags:
      - Pickup Hosts
    summary: "授予球團主辦人身分 (僅限系統管理員)"
    description: |
      授予指定使用者 pickup host 身分。重複授予回傳 409。

      **權限 Access Control**:
      - **System Admin Required**: 僅系統管理員可存取。
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/user.yml#/AddPickupHostRequest"
    responses:
      "201":
        description: Created
      "404":
        description: user not found
        content:
          application/json:
            schema:
              $ref: "../components/schemas/common.yml#/ErrorResponse"
      "409":
        description: user is already a pickup host
        content:
          application/json:
            schema:
              $ref: "../components/schemas/common.yml#/ErrorResponse"

pickupHostDetail:
  delete:
    tags:
      - Pickup Hosts
    summary: "移除球團主辦人身分 (僅限系統管理員)"
    description: |
      移除指定使用者的 pickup host 身分。

      **權限 Access Control**:
      - **System Admin Required**: 僅系統管理員可存取。
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: "使用者 ID"
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: No Content
      "404":
        description: user is not a pickup host
        content:
          application/json:
            schema:
              $ref: "../components/schemas/common.yml#/ErrorResponse"
